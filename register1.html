<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | AeroFlow AI</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: #020617;
    font-family: 'Plus Jakarta Sans', sans-serif;
    color: white;
}

.glass {
    background: rgba(15, 23, 42, 0.7);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.08);
}
</style>
</head>

<body class="flex items-center justify-center h-screen">

<div class="w-full max-w-md p-8 rounded-3xl glass shadow-2xl">
    
    <h1 class="text-3xl font-black mb-6 text-center">
        Farmer <span class="text-blue-500">Register</span>
    </h1>

    <form id="registerForm" class="space-y-4">

        <input id="email" type="email" placeholder="Email"
            class="w-full p-3 rounded-xl bg-slate-900 border border-white/10 outline-none focus:border-blue-500">

        <input id="farmerId" type="text" placeholder="Farmer ID"
            class="w-full p-3 rounded-xl bg-slate-900 border border-white/10 outline-none focus:border-blue-500">

        <input id="password" type="password" placeholder="Password"
            class="w-full p-3 rounded-xl bg-slate-900 border border-white/10 outline-none focus:border-blue-500">

        <input id="confirmPassword" type="password" placeholder="Confirm Password"
            class="w-full p-3 rounded-xl bg-slate-900 border border-white/10 outline-none focus:border-blue-500">

        <button type="submit"
            class="w-full py-3 bg-blue-600 hover:bg-blue-500 rounded-xl font-black uppercase tracking-widest">
            Register
        </button>

        <p id="msg" class="text-center text-sm text-red-400"></p>

    </form>
</div>

<script>
document.getElementById("registerForm").addEventListener("submit", function(e){
    e.preventDefault();

    const email = document.getElementById("email").value;
    const farmerId = document.getElementById("farmerId").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const msg = document.getElementById("msg");

    msg.innerText = "";

    if(!email || !farmerId || !password || !confirmPassword){
        msg.innerText = "All fields are required.";
        return;
    }

    if(password !== confirmPassword){
        msg.innerText = "Passwords do not match.";
        return;
    }

    if(password.length < 6){
        msg.innerText = "Password must be at least 6 characters.";
        return;
    }

    // Simulate register success
    msg.style.color = "lightgreen";
    msg.innerText = "Registration successful... Redirecting";

    setTimeout(() => {
        window.location.href = "sdg-dark.html";
    }, 1000);
});
</script>

</body>
</html>
